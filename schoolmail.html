

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bassiste Pro en 90 jours</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    gtag('js', new Date());
    gtag('config', 'G-LG4Y684BHY');
  </script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2rem;
      max-width: 650px;
      animation: fadeIn 1.2s ease forwards;
    }

    .subtitle {
      opacity: 0;
      margin-bottom: 30px;
      animation: fadeIn 2s ease forwards;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 90%;
      max-width: 400px;
      transform: translateY(30px);
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
    }

    input, textarea {
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    textarea {
      resize: none;
      height: 90px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #25D366, #1ebe5d);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(37,211,102,0.3);
    }

    footer {
      position: absolute;
      bottom: 10px;
      font-size: 12px;
    }

    footer a {
      color: white;
      text-decoration: none;
      margin: 0 5px;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(-20px);} 
      to {opacity:1; transform: translateY(0);} 
    }

    @keyframes fadeUp {
      from {opacity:0; transform: translateY(40px);} 
      to {opacity:1; transform: translateY(0);} 
    }
  </style>
</head>
<body>

  <h1>Comment devenir un Bassiste Pro en 90 jours (même en partant de zéro)</h1>
  <div class="subtitle">Sans théorie compliquée. Juste des résultats.</div>

  <form id="leadForm">
    <input type="text" id="prenom" placeholder="Prénom" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Téléphone" required>
    <textarea id="problem" placeholder="Ton plus gros problème à la basse ?" required></textarea>
    <button type="submit">Commencer sur WhatsApp</button>
  </form>

  <footer>
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Mentions légales</a> |
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Politique de confidentialité</a> |
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Contact</a>
  </footer>

  <script>
    document.getElementById("leadForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const prenom = document.getElementById("prenom").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const problem = document.getElementById("problem").value;

      // Simuler double opt-in (stockage local avant validation)
      localStorage.setItem("leadData", JSON.stringify({prenom, email, phone, problem}));

      alert("Confirme ton inscription via WhatsApp pour valider.");

      const message = `Bonjour, je m'appelle ${prenom}%0AEmail: ${email}%0ATéléphone: ${phone}%0AProblème: ${problem}`;

      const whatsappNumber = "0033769696285"; // REMPLACE

      // Tracking conversion
      gtag('event', 'conversion', {
        'event_category': 'lead',
        'event_label': 'whatsapp_click'
      });

      window.location.href = `https://wa.me/${whatsappNumber}?text=${message}`;
    });
  </script>

</body>
</html>
