<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bassiste Pro en 90 jours</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LG4Y684BHY"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-LG4Y684BHY');
</script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
    color:white;
    text-align:center;
}

.container {
    padding:80px 20px;
}

h1 {
    font-size:42px;
    margin-bottom:10px;
}

.subtitle {
    opacity:0.8;
    margin-bottom:40px;
}

.cta-btn {
    background: linear-gradient(135deg, #6a00ff, #9d4edd);
    border:none;
    padding:18px 35px;
    border-radius:50px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.cta-btn:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(157,78,221,0.7);
}

/* FORM */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.form-box {
    background:#111;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    animation:fadeIn 0.4s ease;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

.submit-btn {
    width:100%;
    background:#9d4edd;
    padding:15px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
}

/* THANK YOU PAGE */
.thank-you {
    display:none;
    padding:80px 20px;
}

a.link {
    color:#9d4edd;
    text-decoration:none;
    font-weight:bold;
}

/* FOOTER */
footer {
    margin-top:50px;
    padding:20px;
    font-size:14px;
    opacity:0.7;
}

footer a {
    color:white;
    margin:0 10px;
    text-decoration:none;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="mainContent">
    <h1>Comment devenir un Bassiste Pro en 90 jours</h1>
    <p class="subtitle">Passe de débutant à musicien solide avec une méthode structurée</p>

    <button class="cta-btn" onclick="openForm()">Commencer maintenant</button>
</div>

<!-- FORM MODAL -->
<div class="modal" id="modal">
    <div class="form-box">
        <form id="leadForm">
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Téléphone" required>
            <textarea id="problem" placeholder="Quel est ton plus gros problème à la basse ?" required></textarea>
            <button type="submit" class="submit-btn">Valider</button>
        </form>
    </div>
</div>

<!-- THANK YOU -->
<div class="thank-you" id="thankYou">
    <h2>Merci 🙌</h2>
    <p>Accède maintenant à la formation :</p>
    <a href="http://abrahamberne.com/" class="link" target="_blank">Voir la formation</a>
</div>

<footer>
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Mentions légales</a> |
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Politique de confidentialité</a> |
    <a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Contact</a>
</footer>

<script>
function openForm() {
    document.getElementById("modal").style.display = "flex";
}

document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();

    let prenom = document.getElementById("prenom").value;
    let problem = document.getElementById("problem").value;

    let message = `Bonjour, je m'appelle ${prenom}. Mon problème à la basse est : ${problem}. Je veux devenir bassiste pro.`;

    let whatsappURL = `https://wa.me/33769696285?text=${encodeURIComponent(message)}`;

    // Ouvre WhatsApp
    window.open(whatsappURL, "_blank");

    // Cache formulaire + affiche page merci
    document.getElementById("modal").style.display = "none";
    document.getElementById("mainContent").style.display = "none";
    document.getElementById("thankYou").style.display = "block";
});
</script>

</body>
</html>
