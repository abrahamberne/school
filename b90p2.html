<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
padding:15px;
text-align:center;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.6);
z-index:1000;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:42px;
max-width:800px;
}

.hero p{
opacity:0.8;
margin:15px 0;
}

/* BUTTON */
.cta{
background:linear-gradient(135deg,#00c6ff,#0072ff);
border:none;
padding:18px 30px;
border-radius:50px;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,114,255,0.5);
transition:0.3s;
}

.cta:hover{
transform:scale(1.05);
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
animation:fadeIn 0.5s;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button.submit{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
}

/* FOOTER */
footer{
padding:30px;
text-align:center;
opacity:0.6;
}

/* WHATSAPP FLOATING */
.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
z-index:3000;
cursor:pointer;
transition:0.3s;
}

.whatsapp-float:hover{
transform:scale(1.1);
}

.whatsapp-float svg{
width:30px;
height:30px;
fill:white;
}
</style>
</head>

<body>

<header>
<div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
<div style="font-size:14px; opacity:0.9;">🎁 FORMATION GRATUITE</div>
<h1 style="margin:0; font-size:20px;">📞 +33 7 69 69 62 85</h1>
</div>
</header>

<section class="hero">
<h1>Comment devenir un Bassiste Pro en 90 jours</h1>
<p>Accède à la méthode utilisée par les bassistes avancés</p>
<button class="cta" onclick="openForm()">Accéder à la formation</button>
</section>

<!-- MODAL FORM -->
<div class="modal" id="formModal">
<div class="modal-content">
<form id="leadForm">
<input type="text" id="name" placeholder="Prénom" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="phone" placeholder="Téléphone" required>
<textarea id="problem" placeholder="Ton problème principal"></textarea>
<button type="submit" class="submit">Valider</button>
</form>
</div>
</div>

<!-- WHATSAPP FLOATING BUTTON -->
<div class="whatsapp-float" onclick="openWhatsAppDirect()">
<svg viewBox="0 0 32 32">
<path d="M16 .396C7.163.396 0 7.558 0 16.396c0 2.885.753 5.704 2.185 8.195L0 32l7.623-2.155A15.92 15.92 0 0016 32c8.837 0 16-7.162 16-16S24.837.396 16 .396zm0 29.11c-2.523 0-4.994-.66-7.153-1.912l-.511-.303-4.527 1.279 1.21-4.414-.332-.54A13.39 13.39 0 012.61 16.4c0-7.381 6.01-13.392 13.39-13.392 7.381 0 13.39 6.01 13.39 13.391 0 7.382-6.009 13.392-13.39 13.392zm7.37-10.087c-.403-.202-2.38-1.174-2.75-1.307-.37-.134-.64-.202-.91.202-.27.403-1.04 1.307-1.274 1.577-.235.27-.47.303-.873.101-.403-.202-1.703-.628-3.243-2.003-1.198-1.07-2.007-2.39-2.243-2.793-.235-.403-.025-.62.177-.822.182-.182.403-.47.605-.705.202-.235.27-.403.403-.673.134-.27.067-.505-.034-.707-.101-.202-.91-2.192-1.247-3.002-.328-.79-.662-.683-.91-.696l-.776-.014c-.27 0-.707.101-1.078.505s-1.414 1.382-1.414 3.368c0 1.986 1.447 3.902 1.649 4.172.202.27 2.85 4.355 6.91 6.1.967.417 1.722.666 2.311.852.97.308 1.853.264 2.552.16.779-.116 2.38-.973 2.716-1.912.336-.94.336-1.746.235-1.912-.101-.168-.37-.27-.773-.47z"/>
</svg>
</div>

<footer>
<a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Mentions légales</a> |
<a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Politique de confidentialité</a> |
<a href="https://abrahamberne1.github.io/ultrabasse/music/mentionlegale">Contact</a>
</footer>

<script>
function openForm(){
document.getElementById("formModal").style.display="flex";
}

document.getElementById("leadForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;
let problem = document.getElementById("problem").value;

let message = `Nouveau lead :
Prénom: ${name}
Email: ${email}
Téléphone: ${phone}
Problème: ${problem}`;

let whatsappURL = "https://wa.me/33769696285?text=" + encodeURIComponent(message);

// REDIRECTION WHATSAPP
window.open(whatsappURL, '_blank');

// REDIRECTION PAGE MERCI
setTimeout(()=>{
window.location.href="http://abrahamberne.com/";
},1500);

});

// BOUTON FLOAT DIRECT
function openWhatsAppDirect(){
window.open("https://wa.me/33769696285", "_blank");
}
</script>

</body>
</html>
